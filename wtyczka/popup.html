<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Menedżer Haseł IoT</title>
    <style>
        body { width: 360px; padding: 15px; font-family: Arial, Helvetica, sans-serif; text-align: center; box-sizing: border-box; }
        input, button { width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { margin-bottom: 5px; cursor: pointer; border: none; font-weight: bold; }
        
        #loginBtn { background-color: #007bff; color: white; }
        #registerBtn { background-color: #28a745; color: white; }
        #status { margin-top: 15px; font-weight: bold; }
        
        .entry { margin-bottom: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9; text-align: left; }
        .entry-actions { margin-top: 6px; display: flex; gap: 6px; }
        .entry-actions button { flex: 1; padding: 5px; font-size: 12px; font-weight: normal; margin: 0; }
        .btn-edit { background-color: #ffc107; color: #000; }
        .btn-delete { background-color: #dc3545; color: white; }
        
        .edit-form { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #aaa; }
        .edit-form input { padding: 6px; margin-bottom: 6px; }
        .edit-form .row { display: flex; gap: 6px; }
        .edit-form .row button { flex: 1; padding: 6px; font-size: 12px; margin: 0; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-cancel { background-color: #6c757d; color: white; }
        
        .entry, .entry strong, .vault-text, .password-text, .login-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
            color: #333;
        }

        .entry strong { font-weight: bold; }

        .password-text {
            background-color: #eee;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            max-width: 170px;
            box-sizing: border-box;
            white-space: normal;
            word-wrap: break-word;
            word-break: break-all;
            cursor: default;
        }

        .password-text.masked { 
            white-space: nowrap; 
            word-break: keep-all; 
            letter-spacing: 1px; 
            font-weight: bold; 
        }
        
        .password-text:not(.masked), .login-text { cursor: pointer; }
        .password-text:not(.masked):hover, .login-text:hover { background-color: #e2e2e2; }
        
        .login-text { transition: color 0.2s ease; display: inline-block; padding: 2px 4px; border-radius: 3px; }
        .login-text:hover { color: #000; }
    </style>
</head>
<body>
    <h3>Menedżer Haseł</h3>
    
    <div id="authArea">
        <input type="email" id="email" placeholder="Adres Email">
        <input type="password" id="password" placeholder="Hasło Główne">
        <button id="loginBtn">Zaloguj się</button>
        <button id="registerBtn">Zarejestruj Nowe Konto</button>
    </div>

    <div id="vaultArea" style="display: none;">
        <button id="logoutBtn" style="background-color: #dc3545; width: auto; float: right; padding: 5px;">Wyloguj</button>
        <div style="clear: both; margin-bottom: 15px;"></div>
        
        <h4>Dodaj nowy wpis:</h4>
        <input type="text" id="newUrl" placeholder="Strona (np. google.com)">
        <input type="text" id="newLogin" placeholder="Login / Email">
        <input type="password" id="newPassword" placeholder="Hasło">
        <button id="savePasswordBtn" style="background-color: #17a2b8;">Zapisz w sejfie</button>
        
        <hr>
        <h4>Twoje Hasła:</h4>
        <ul id="passwordList" style="list-style-type: none; padding: 0; text-align: left;">
        </ul>
    </div>

    <p id="status"></p>

    <script src="crypto.js"></script>
    <script src="popup.js" type="module"></script>
</body>
</html>
